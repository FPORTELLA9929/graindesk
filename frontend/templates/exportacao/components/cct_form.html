<div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
    <div class="p-6 border-b">
        <h2 class="font-semibold text-slate-800">Consulta Portal Único CCT</h2>
        <p class="text-sm text-slate-500">
            Informe uma ou mais chaves de acesso para atualizar o estoque CCT.
        </p>
    </div>

    <form method="post" class="p-6 space-y-5">
        <div>
            <label class="block text-xs font-semibold text-slate-500 mb-2">
                Chaves de Acesso NF-e
            </label>

            <textarea
                name="chaves"
                rows="6"
                required
                placeholder="Cole uma chave por linha"
                class="w-full rounded-xl border px-4 py-3 text-sm font-mono resize-y">{{ chaves or "" }}</textarea>

            <p class="text-xs text-slate-500 mt-2">
                O sistema remove espaços, pontos e outros caracteres automaticamente.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row justify-end gap-3">
            <a href="/exportacao/cct/" class="px-5 py-3 rounded-xl border font-semibold text-sm text-slate-700 hover:bg-slate-50 text-center">
                Limpar
            </a>

            <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold text-sm">
                Consultar e Atualizar Estoque
            </button>
        </div>
    </form>
</div>
