{% if mensagem %}
    <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4 text-emerald-700">
        {{ mensagem }}
    </div>
    {% endif %}

    {% if erros %}
    <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-red-700">
        <p class="font-semibold mb-2">Alguns processos não puderam ser concluídos:</p>
        <ul class="list-disc ml-5 space-y-1">
            {% for erro in erros %}
            <li>{{ erro }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
