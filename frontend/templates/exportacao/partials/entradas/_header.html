<div class="flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">
                {{ titulo_pagina }}
            </h1>
            <p class="text-sm text-slate-500">
                {{ subtitulo_pagina }}
            </p>
        </div>

        <div class="flex gap-3">
            <button
                onclick="document.getElementById('modalReserva').classList.remove('hidden')"
                class="bg-amber-500 hover:bg-amber-600 text-white px-5 py-3 rounded-xl font-semibold">
                Reservar Saldo
            </button>

            <button
                onclick="document.getElementById('modalImportar').classList.remove('hidden')"
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-semibold">
                Importar XML
            </button>
        </div>
    </div>
