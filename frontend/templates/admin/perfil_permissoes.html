{% extends "layout/base.html" %}

{% block content %}

<div class="space-y-6">

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">

        <div class="flex items-center justify-between">

            <div>
                <h2 class="text-xl font-bold text-slate-800">
                    Perfil: {{ perfil.nome }}
                </h2>

                <p class="text-sm text-slate-500 mt-1">
                    {{ perfil.descricao or "Configure as permissões deste perfil." }}
                </p>
            </div>

            <a href="/admin/perfis/"
               class="border border-slate-300 px-4 py-2 rounded-xl text-sm font-semibold text-slate-700 hover:bg-slate-50">
                Voltar
            </a>

        </div>

    </div>

    <form method="post" class="space-y-6">

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

            <div class="px-6 py-4 border-b border-slate-200">
                <h3 class="font-bold text-slate-800">
                    Permissões do Perfil
                </h3>
                <p class="text-sm text-slate-500 mt-1">
                    Marque os módulos que este perfil poderá acessar.
                </p>
            </div>

            <div class="p-6 grid grid-cols-2 gap-4">

                {% for permissao in permissoes %}

                <label class="flex items-start gap-3 border border-slate-200 rounded-xl p-4 hover:bg-slate-50 cursor-pointer">

                    <input
                        type="checkbox"
                        name="permissoes"
                        value="{{ permissao.id }}"
                        class="mt-1"
                        {% if permissao.id in permissoes_marcadas %}
                        checked
                        {% endif %}
                    >

                    <div>
                        <div class="font-semibold text-slate-800">
                            {{ permissao.nome }}
                        </div>

                        <div class="text-xs text-slate-500 mt-1">
                            {{ permissao.modulo }} • {{ permissao.codigo }}
                        </div>
                    </div>

                </label>

                {% endfor %}

            </div>

        </div>

        <div class="flex justify-end gap-3">

            <a href="/admin/perfis/"
               class="border border-slate-300 px-5 py-2 rounded-xl text-sm font-semibold text-slate-700 hover:bg-slate-50">
                Cancelar
            </a>

            <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-sm font-semibold">
                Salvar permissões
            </button>

        </div>

    </form>

</div>

{% endblock %}
